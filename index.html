<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DocPilot - Hub</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        primary:              '#022448',
                        'primary-container':  '#1e3a5f',
                        'on-primary':         '#ffffff',
                        'on-primary-container': '#8aa4cf',
                        'secondary-container': '#fea619',
                        'on-secondary-container': '#684000',
                        'surface':            '#f7f9fb',
                        'surface-container-lowest': '#ffffff',
                        'surface-container':  '#eceef0',
                        'surface-container-high': '#e6e8ea',
                        'surface-variant':    '#e0e3e5',
                        'on-surface':         '#191c1e',
                        'on-surface-variant': '#43474e',
                        'outline-variant':    '#c4c6cf',
                        'outline':            '#74777f',
                        error:                '#ba1a1a',
                        'tertiary-fixed':     '#dae2fd',
                        'on-tertiary-fixed':  '#131b2e',
                        'secondary-fixed':    '#ffddb8',
                        'on-secondary-fixed': '#2a1700',
                    },
                    spacing: {
                        'sidebar-width': '240px',
                    }
                }
            }
        }
    </script>

    <link rel="stylesheet" href="src/css/styles.css">

    <style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-smoothing: antialiased;
        }
        body { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
        ::-webkit-scrollbar { width: 4px; background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 9999px; }

        /* Sidebar active state */
        .nav-item-active {
            background-color: #1e3a5f;
            border-left: 4px solid #fea619;
            color: #ffffff;
        }
        .nav-item {
            border-left: 4px solid transparent;
            color: #8aa4cf;
            transition: background 0.15s, color 0.15s;
        }
        .nav-item:hover {
            background-color: rgba(30,58,95,0.6);
            color: #ffffff;
        }

        /* Top bar frosted glass */
        .topbar-glass {
            background: rgba(247,249,251,0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        /* Project card override for JS-injected cards */
        #projectGrid > div {
            background: #ffffff;
            border: 1px solid #e0e3e5;
            border-radius: 12px;
            padding: 20px;
            transition: box-shadow 0.2s ease, transform 0.2s ease;
            cursor: pointer;
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        #projectGrid > div:hover {
            box-shadow: 0 4px 12px rgba(15,23,42,0.08);
            transform: translateY(-2px);
        }
        #projectGrid > div:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-sans antialiased h-screen overflow-hidden flex">

    <!-- ===================== SIDEBAR (Desktop) ===================== -->
    <nav class="hidden md:flex flex-col bg-primary text-on-primary w-sidebar-width h-screen fixed left-0 top-0 z-50 shrink-0">

        <!-- Logo / Brand -->
        <div class="px-6 py-6 border-b border-primary-container/40">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 rounded-lg bg-secondary-container flex items-center justify-center shrink-0">
                    <span class="material-symbols-outlined text-[18px] text-on-secondary-container" style="font-variation-settings:'FILL' 1">bolt</span>
                </div>
                <div>
                    <div class="text-base font-bold text-on-primary leading-tight">DocPilot</div>
                    <div class="text-[11px] font-semibold text-on-primary-container tracking-wider uppercase">Hub</div>
                </div>
            </div>
        </div>

        <!-- Nav Items -->
        <div class="flex-1 flex flex-col gap-0.5 overflow-y-auto py-4 px-2">
            <!-- Dashboard / Home — Active -->
            <a href="index.html" class="nav-item nav-item-active flex items-center gap-3 px-4 py-3 rounded-r-lg text-sm font-semibold">
                <span class="material-symbols-outlined text-[22px]" style="font-variation-settings:'FILL' 1">home</span>
                <span>Dashboard</span>
            </a>

            <!-- Profile -->
            <a href="profile.html" class="nav-item flex items-center gap-3 px-4 py-3 rounded-r-lg text-sm font-semibold">
                <span class="material-symbols-outlined text-[22px]">person</span>
                <span>Profile</span>
            </a>

            <!-- Admin — superadmin only (JS will toggle visibility) -->
            <a href="admin.html" id="adminNavBtn" class="nav-item flex items-center gap-3 px-4 py-3 rounded-r-lg text-sm font-semibold" style="display:none">
                <span class="material-symbols-outlined text-[22px]">admin_panel_settings</span>
                <span>Admin</span>
            </a>

            <!-- Super Logs — superadmin only (JS will toggle visibility) -->
            <a href="superlog.html" id="superLogNavBtn" class="nav-item flex items-center gap-3 px-4 py-3 rounded-r-lg text-sm font-semibold" style="display:none">
                <span class="material-symbols-outlined text-[22px]">manage_search</span>
                <span>Super Logs</span>
            </a>
        </div>

        <!-- Logout at bottom -->
        <div class="px-2 py-4 border-t border-primary-container/40">
            <button id="logoutBtn" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-semibold">
                <span class="material-symbols-outlined text-[22px]">logout</span>
                <span>Logout</span>
            </button>
        </div>
    </nav>

    <!-- ===================== MAIN AREA ===================== -->
    <div class="flex-1 flex flex-col h-screen md:ml-sidebar-width overflow-hidden">

        <!-- TOP BAR -->
        <header class="topbar-glass sticky top-0 z-40 border-b border-outline-variant/60 shadow-sm">
            <div class="flex items-center justify-between px-4 md:px-8 h-16 gap-3">

                <!-- Mobile: hamburger + logo -->
                <div class="flex items-center gap-3 md:hidden">
                    <button id="mobileMenuBtn" class="p-2 rounded-lg text-on-surface-variant hover:bg-surface-container transition-colors">
                        <span class="material-symbols-outlined text-[22px]">menu</span>
                    </button>
                    <span class="text-base font-bold text-primary">DocPilot</span>
                </div>

                <!-- Search bar (desktop: left-ish, mobile: flex) -->
                <div class="relative flex-1 max-w-md hidden sm:block">
                    <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px]">search</span>
                    <input
                        id="projectSearch"
                        type="text"
                        placeholder="Search projects…"
                        class="w-full bg-surface-container rounded-full py-2 pl-10 pr-4 text-sm text-on-surface border border-outline-variant/40 focus:ring-2 focus:ring-primary focus:outline-none transition-all placeholder-on-surface-variant"
                    >
                </div>

                <!-- Right actions -->
                <div class="flex items-center gap-2 ml-auto">
                    <!-- Mobile search icon -->
                    <button class="sm:hidden p-2 rounded-lg text-on-surface-variant hover:bg-surface-container transition-colors">
                        <span class="material-symbols-outlined text-[22px]">search</span>
                    </button>

                    <!-- Avatar / profile link -->
                    <a href="profile.html" class="w-9 h-9 rounded-full bg-primary-container flex items-center justify-center ring-2 ring-transparent hover:ring-secondary-container transition-all cursor-pointer overflow-hidden" title="Profile">
                        <span class="material-symbols-outlined text-[20px] text-on-primary-container" style="font-variation-settings:'FILL' 1">person</span>
                    </a>
                </div>
            </div>
        </header>

        <!-- CONTENT -->
        <main class="flex-1 overflow-y-auto bg-surface pb-20 md:pb-8">
            <div class="max-w-6xl mx-auto px-4 md:px-8 py-8">

                <!-- Page heading + New Project -->
                <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-8">
                    <div>
                        <h1 class="text-2xl font-bold text-primary tracking-tight" data-i18n="hub.projects">Projects</h1>
                        <p class="text-sm text-on-surface-variant mt-0.5">Select a project to open its dashboard.</p>
                    </div>

                    <button
                        id="newProjectBtn"
                        onclick="window.location.href='new-project.html'"
                        style="display:none"
                        class="w-full sm:w-auto shrink-0 bg-secondary-container text-on-secondary-container hover:brightness-105 active:scale-[0.98] font-semibold text-sm py-2.5 px-5 rounded-lg flex items-center justify-center gap-2 shadow-sm transition-all"
                    >
                        <span class="material-symbols-outlined text-[20px]">add</span>
                        <span data-i18n="hub.newProject">New Project</span>
                    </button>
                </div>

                <!-- Projects Grid — JS renders cards inside here -->
                <div id="projectGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">
                    <!-- Loading State -->
                    <div class="col-span-full py-16 flex flex-col items-center gap-3 text-on-surface-variant">
                        <svg class="w-6 h-6 animate-spin" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                        <span class="text-sm">Loading projects…</span>
                    </div>
                </div>

            </div>
        </main>
    </div><!-- end main area -->

    <!-- ===================== BOTTOM NAV (Mobile) ===================== -->
    <nav class="md:hidden fixed bottom-0 left-0 right-0 z-50 bg-surface-container-lowest border-t border-outline-variant shadow-[0_-2px_8px_rgba(0,0,0,0.08)] flex justify-around items-center h-16 px-2">

        <!-- Home — active -->
        <a href="index.html" class="flex flex-col items-center justify-center gap-0.5 p-2 rounded-xl w-16 text-secondary-container">
            <span class="material-symbols-outlined text-[24px]" style="font-variation-settings:'FILL' 1">home</span>
            <span class="text-[10px] font-semibold">Home</span>
        </a>

        <!-- Profile -->
        <a href="profile.html" class="flex flex-col items-center justify-center gap-0.5 p-2 rounded-xl w-16 text-on-surface-variant hover:text-primary transition-colors">
            <span class="material-symbols-outlined text-[24px]">person</span>
            <span class="text-[10px] font-semibold">Profile</span>
        </a>

        <!-- Admin — superadmin only -->
        <a href="admin.html" id="adminBottomNavBtn" class="flex flex-col items-center justify-center gap-0.5 p-2 rounded-xl w-16 text-on-surface-variant hover:text-primary transition-colors" style="display:none">
            <span class="material-symbols-outlined text-[24px]">admin_panel_settings</span>
            <span class="text-[10px] font-semibold">Admin</span>
        </a>

        <!-- Logout -->
        <button id="logoutBtnMobile" class="flex flex-col items-center justify-center gap-0.5 p-2 rounded-xl w-16 text-on-surface-variant hover:text-error transition-colors">
            <span class="material-symbols-outlined text-[24px]">logout</span>
            <span class="text-[10px] font-semibold">Logout</span>
        </button>
    </nav>

    <!-- ===================== NAS SYNC BANNER ===================== -->
    <div id="nas-sync-banner" class="hidden fixed bottom-20 md:bottom-4 left-1/2 -translate-x-1/2 z-50 flex items-center gap-3 bg-on-surface text-on-primary text-sm font-medium px-5 py-3 rounded-2xl shadow-xl" role="status">
        <svg class="w-4 h-4 animate-spin flex-shrink-0" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <span id="nas-sync-banner-text">Syncing from NAS… this may take a moment</span>
    </div>

    <!-- ===================== SCRIPTS ===================== -->
    <script src="src/js/api.js"></script>
    <script src="src/js/dashboard.js"></script>
    <script src="src/js/logout.js"></script>
    <script src="src/js/header-avatar.js"></script>
    <script src="src/js/i18n.js"></script>
    <script src="src/js/force-logout.js"></script>
    <script src="src/js/idle-logout.js?v=20260414a"></script>

    <script>
        // Wire mobile logout button to same handler as desktop (logout.js likely uses id="logoutBtn")
        const logoutBtnMobile = document.getElementById('logoutBtnMobile');
        const logoutBtn = document.getElementById('logoutBtn');
        if (logoutBtnMobile && logoutBtn) {
            logoutBtnMobile.addEventListener('click', () => logoutBtn.click());
        }

        // Sync admin nav visibility: if adminNavBtn is shown by JS, also show bottom nav equiv
        const observer = new MutationObserver(() => {
            const adminNav = document.getElementById('adminNavBtn');
            const adminBottom = document.getElementById('adminBottomNavBtn');
            if (adminNav && adminBottom) {
                adminBottom.style.display = adminNav.style.display;
            }
        });
        const adminNavBtn = document.getElementById('adminNavBtn');
        if (adminNavBtn) observer.observe(adminNavBtn, { attributes: true, attributeFilter: ['style'] });
    </script>
</body>
</html>
