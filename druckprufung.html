<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DocPilot — Druckprüfung</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="src/css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        gray: { 50:'#f9fafb',100:'#f3f4f6',200:'#e5e7eb',300:'#d1d5db',800:'#1f2937',900:'#111827' }
                    }
                }
            }
        }
    </script>
    <style>
        body { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
        ::-webkit-scrollbar { width: 4px; background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 4px; }

        /* ── Header ── */
        .glass-header {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-bottom: 1px solid rgba(0,0,0,0.06);
        }

        /* ── Breadcrumb ── */
        .breadcrumb-bar {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 10px 0 14px;
            flex-wrap: wrap;
        }
        .bc-btn {
            font-size: 13px;
            font-weight: 600;
            color: #6b7280;
            background: none;
            border: none;
            cursor: pointer;
            padding: 2px 4px;
            border-radius: 6px;
            transition: color 0.15s, background 0.15s;
        }
        .bc-btn:hover { color: #111827; background: #f3f4f6; }
        .bc-active { color: #111827; }
        .bc-current { cursor: default; }
        .bc-current:hover { background: none; }
        .bc-sep { width: 14px; height: 14px; color: #d1d5db; flex-shrink: 0; }

        /* ── Module cards (cluster / knotenpunkt) ── */
        .mod-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
        }
        .mod-card {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 14px;
            padding: 16px 12px 12px;
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            user-select: none;
        }
        .mod-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.08);
            border-color: #d1d5db;
        }
        .mod-card:active { transform: scale(0.97); }
        .mod-card-icon { line-height: 0; }
        .mod-card-name {
            font-size: 12px;
            font-weight: 700;
            color: #111827;
            text-align: center;
            word-break: break-word;
            line-height: 1.35;
            max-width: 100%;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .mod-card-meta { font-size: 11px; color: #9ca3af; font-weight: 500; }

        /* ── Address list ── */
        .addr-list { display: flex; flex-direction: column; gap: 8px; }
        .addr-row {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: background 0.12s, box-shadow 0.12s;
            user-select: none;
        }
        .addr-row:hover { background: #f9fafb; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .addr-info { flex: 1; min-width: 0; }
        .addr-end  { font-size: 13px; font-weight: 700; color: #111827; truncate: true; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .addr-cable{ font-size: 11px; color: #9ca3af; font-weight: 500; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .addr-right{ display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

        /* ── Status badges ── */
        .mod-badge {
            display: inline-flex;
            align-items: center;
            font-size: 11px;
            font-weight: 700;
            padding: 2px 9px;
            border-radius: 999px;
            letter-spacing: 0.02em;
        }
        .mod-badge-done    { background: #dcfce7; color: #15803d; }
        .mod-badge-pending { background: #fef9c3; color: #a16207; }

        /* ── Upload form ── */
        .upload-wrap {
            max-width: 520px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Address detail card */
        .addr-detail-card {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 14px;
            padding: 16px 20px;
        }
        .detail-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            padding: 7px 0;
            border-bottom: 1px solid #f3f4f6;
            font-size: 13px;
        }
        .detail-row:last-child { border-bottom: none; }
        .detail-lbl { color: #6b7280; font-weight: 500; flex-shrink: 0; }
        .detail-val { color: #111827; font-weight: 600; text-align: right; word-break: break-word; }

        /* Existing file info */
        .existing-info {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 13px;
        }

        /* Upload card */
        .upload-card {
            background: rgba(255,255,255,0.97);
            border: 1px solid #e5e7eb;
            border-radius: 18px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.04);
        }
        .upload-card-title {
            font-size: 15px;
            font-weight: 700;
            color: #111827;
            margin: 0;
        }

        /* Form elements */
        .form-grp { display: flex; flex-direction: column; gap: 6px; }
        .form-lbl { font-size: 12px; font-weight: 600; color: #374151; }
        .form-sel, .form-inp {
            border: 1.5px solid #e5e7eb;
            border-radius: 10px;
            padding: 9px 12px;
            font-size: 13px;
            font-weight: 500;
            color: #111827;
            background: #f9fafb;
            outline: none;
            transition: border-color 0.15s, background 0.15s;
            width: 100%;
            font-family: inherit;
        }
        .form-sel:focus, .form-inp:focus {
            border-color: #6366f1;
            background: #fff;
        }

        /* Drop zone */
        .drop-zone {
            border: 2px dashed #e5e7eb;
            border-radius: 14px;
            padding: 32px 24px;
            text-align: center;
            transition: border-color 0.15s, background 0.15s;
            cursor: pointer;
            position: relative;
        }
        .drop-zone.dz-over {
            border-color: #6366f1;
            background: rgba(99,102,241,0.04);
        }
        .sel-file-info {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 4px 0;
        }

        /* Upload button */
        .upload-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 11px 20px;
            background: #111827;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
            font-family: inherit;
        }
        .upload-btn:hover:not(:disabled) { background: #374151; transform: translateY(-1px); }
        .upload-btn:active:not(:disabled) { transform: scale(0.98); }
        .upload-btn:disabled { background: #9ca3af; cursor: not-allowed; }

        /* Status message */
        .upload-status-msg {
            font-size: 13px;
            font-weight: 600;
            padding: 10px 14px;
            border-radius: 10px;
            text-align: center;
        }
        .upload-ok  { background: #dcfce7; color: #15803d; }
        .upload-err { background: #fee2e2; color: #dc2626; }

        /* Empty / error states */
        .mod-empty {
            padding: 64px 24px;
            text-align: center;
            color: #9ca3af;
        }
        .mod-empty p { font-size: 14px; font-weight: 500; margin-top: 4px; }
        .mod-error {
            padding: 24px;
            text-align: center;
            color: #dc2626;
            font-size: 13px;
            font-weight: 600;
            background: #fee2e2;
            border-radius: 12px;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-[100dvh] flex flex-col selection:bg-indigo-100">
<script>
    (function() {
        var role = localStorage.getItem('userRole');
        if (!role) { window.location.href = 'login.html'; }
    })();
</script>

    <!-- Glass Header -->
    <header class="glass-header sticky top-0 z-50 w-full px-4 sm:px-8 py-3 flex justify-between items-center gap-3">
        <div class="flex items-center gap-2 sm:gap-3 min-w-0">
            <button id="backBtn" class="p-2 -ml-2 text-gray-400 hover:text-gray-900 hover:bg-gray-100 rounded-lg transition-colors shrink-0" title="Back to Project Hub">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                </svg>
            </button>
            <div class="w-px h-5 bg-gray-200 mx-1 shrink-0"></div>
            <!-- Module icon -->
            <svg class="w-5 h-5 text-indigo-500 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
            <div class="flex flex-col min-w-0">
                <h1 class="text-base sm:text-lg font-bold tracking-tight leading-none truncate" id="projectNameDisplay">LOADING…</h1>
                <span class="text-xs text-gray-400 font-medium mt-0.5">Druckprüfung</span>
            </div>
        </div>
        <div class="flex items-center gap-2 shrink-0">
            <button onclick="window.location.href='profile.html'"
                class="p-2 text-gray-400 hover:text-gray-900 hover:bg-gray-100 rounded-lg transition-colors" title="Profile">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                </svg>
            </button>
        </div>
    </header>

    <main class="flex-grow w-full max-w-5xl mx-auto px-4 sm:px-8 py-6">
        <!-- Breadcrumb -->
        <nav class="breadcrumb-bar" id="moduleBreadcrumb" aria-label="Navigation">
            <span class="bc-btn bc-active">Cluster</span>
        </nav>

        <!-- Dynamic content area -->
        <div id="moduleContent">
            <div class="py-16 flex justify-center text-gray-300">
                <svg class="w-6 h-6 animate-spin" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            </div>
        </div>
    </main>

    <script src="src/js/api.js"></script>
    <script src="src/js/module-shared.js"></script>
    <script src="src/js/druckprufung.js"></script>
    <script src="src/js/logout.js"></script>
<script src="src/js/header-avatar.js"></script>
<script src="src/js/i18n.js"></script>
<script src="src/js/force-logout.js"></script>
<script src="src/js/idle-logout.js?v=20260414a"></script>
</body>
</html>
