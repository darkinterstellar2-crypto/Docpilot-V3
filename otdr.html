<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DocPilot — OTDR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="src/css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        primary:      '#022448',
                        accent:       '#fea619',
                        surface:      '#F8FAFC',
                        'sidebar-bg': '#022448',
                    }
                }
            }
        }
    </script>
    <style>
        /* ── Base ── */
        body { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 4px; background: transparent; }
        ::-webkit-scrollbar-thumb { background: #c4c6cf; border-radius: 4px; }

        /* ── Material Symbols ── */
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal; font-style: normal; font-size: 24px; line-height: 1;
            letter-spacing: normal; text-transform: none; display: inline-block;
            white-space: nowrap; direction: ltr;
            font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
        }

        /* ── Sidebar ── */
        #sidebar {
            width: 240px;
            background: #022448;
            position: fixed; left: 0; top: 0; bottom: 0;
            display: flex; flex-direction: column;
            z-index: 50;
            border-right: 1px solid rgba(255,255,255,0.08);
        }
        .sidebar-logo {
            padding: 24px 20px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .sidebar-logo h1 { font-size: 20px; font-weight: 700; color: #fff; letter-spacing: -0.01em; }
        .sidebar-logo p  { font-size: 11px; font-weight: 600; color: #8aa4cf; margin-top: 2px; letter-spacing: 0.03em; }

        .sidebar-nav { flex: 1; padding: 12px; overflow-y: auto; display: flex; flex-direction: column; gap: 2px; }
        .nav-link {
            display: flex; align-items: center; gap: 12px;
            padding: 10px 12px; border-radius: 8px;
            font-size: 13px; font-weight: 600; color: #8aa4cf;
            text-decoration: none;
            transition: background 0.15s, color 0.15s;
            cursor: pointer; border: none; background: none; width: 100%; text-align: left;
        }
        .nav-link:hover { background: rgba(255,255,255,0.08); color: #fff; }
        .nav-link.active {
            background: rgba(255,255,255,0.1); color: #fff;
            border-left: 3px solid #fea619; padding-left: 9px;
        }
        .nav-link .material-symbols-outlined { font-size: 20px; flex-shrink: 0; }

        .sidebar-bottom {
            padding: 12px;
            border-top: 1px solid rgba(255,255,255,0.08);
        }

        /* ── Header ── */
        .app-header {
            background: rgba(248,250,252,0.92);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid #E2E8F0;
            position: sticky; top: 0; z-index: 40;
            height: 60px;
            display: flex; align-items: center;
            padding: 0 20px; gap: 12px;
        }
        .app-header h1 {
            font-size: 15px; font-weight: 700; color: #022448;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .app-header .module-label {
            font-size: 11px; font-weight: 600; color: #74777f; letter-spacing: 0.04em;
        }

        /* ── Breadcrumb ── */
        .breadcrumb-bar {
            display: flex; align-items: center; gap: 4px;
            padding: 12px 0 16px; flex-wrap: wrap;
        }
        .bc-btn {
            font-size: 13px; font-weight: 600; color: #74777f;
            background: none; border: none; cursor: pointer;
            padding: 3px 6px; border-radius: 6px;
            transition: color 0.15s, background 0.15s;
        }
        .bc-btn:hover { color: #022448; background: #E2E8F0; }
        .bc-active { color: #022448; }
        .bc-current { cursor: default; }
        .bc-current:hover { background: none; }
        .bc-sep { width: 14px; height: 14px; color: #c4c6cf; flex-shrink: 0; }

        /* ── Module cards (cluster/knotenpunkt grid) ── */
        .mod-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
        }
        .mod-card {
            background: #fff; border: 1px solid #E2E8F0; border-radius: 12px;
            padding: 16px 12px 12px; cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
            display: flex; flex-direction: column; align-items: center; gap: 8px;
            user-select: none;
        }
        .mod-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(2,36,72,0.08); border-color: #adc8f5; }
        .mod-card:active { transform: scale(0.97); }
        .mod-card-icon { line-height: 0; }
        .mod-card-name {
            font-size: 12px; font-weight: 700; color: #191c1e;
            text-align: center; word-break: break-word; line-height: 1.35;
            max-width: 100%; display: -webkit-box;
            -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }
        .mod-card-meta { font-size: 11px; color: #74777f; font-weight: 500; }

        /* ── Address list ── */
        .addr-list { display: flex; flex-direction: column; gap: 8px; }
        .addr-row {
            background: #fff; border: 1px solid #E2E8F0; border-radius: 12px;
            padding: 14px 16px; display: flex; align-items: center; gap: 12px;
            cursor: pointer; transition: background 0.12s, box-shadow 0.12s, border-color 0.12s;
            user-select: none;
        }
        .addr-row:hover { background: #F2F4F6; box-shadow: 0 2px 10px rgba(2,36,72,0.07); border-color: #c4c6cf; }
        .addr-info  { flex: 1; min-width: 0; }
        .addr-end   { font-size: 14px; font-weight: 700; color: #191c1e; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .addr-cable { font-size: 11px; color: #74777f; font-weight: 500; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .addr-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
        .addr-file-count { font-size: 11px; color: #43474e; font-weight: 600; white-space: nowrap; }

        /* ── Status badges — Design System exact spec ── */
        .mod-badge {
            display: inline-flex; align-items: center;
            font-size: 11px; font-weight: 700;
            padding: 3px 10px; border-radius: 9999px; letter-spacing: 0.02em;
            white-space: nowrap;
        }
        /* Done = green */
        .mod-badge-done       { background: #e6f4ea; color: #137333; border: 1px solid #ceead6; }
        /* Pending = grey */
        .mod-badge-pending    { background: #f1f3f4; color: #5f6368; border: 1px solid #e0e3e5; }
        /* Waiting = BLUE — critical "gate open" state — prominent */
        .mod-badge-waiting    {
            background: #d5e3ff; color: #1a56db; border: 1.5px solid #adc8f5;
            font-size: 12px; padding: 4px 12px;
            box-shadow: 0 0 0 3px rgba(26,86,219,0.10);
        }
        /* Incomplete = red/error */
        .mod-badge-incomplete { background: #ffdad6; color: #ba1a1a; border: 1px solid #ffb4ab; }

        /* ── Empty / error states ── */
        .mod-empty { padding: 64px 24px; text-align: center; color: #74777f; }
        .mod-empty p { font-size: 14px; font-weight: 500; margin-top: 4px; }
        .mod-error {
            padding: 24px; text-align: center; color: #ba1a1a;
            font-size: 13px; font-weight: 600;
            background: #ffdad6; border-radius: 12px;
        }

        /* ── Card / Glass Card ── */
        .glass-card {
            background: #ffffff;
            border: 1px solid #E2E8F0;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 4px rgba(15,23,42,0.05);
        }

        /* ── OTDR Form wrap ── */
        .otdr-form-wrap {
            max-width: 640px; margin: 0 auto;
            display: flex; flex-direction: column; gap: 16px;
        }

        /* ── Detail rows ── */
        .detail-row { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; padding: 4px 0; }
        .detail-lbl { font-size: 12px; font-weight: 600; color: #74777f; }
        .detail-val { font-size: 13px; font-weight: 600; color: #191c1e; text-align: right; }

        /* ── Existing files block ── */
        .existing-info {
            display: flex; align-items: flex-start; gap: 10px;
            background: #e6f4ea; border: 1px solid #ceead6;
            border-radius: 12px; padding: 14px;
        }
        .file-list-scroll {
            max-height: 160px; overflow-y: auto;
            border: 1px solid #E2E8F0; border-radius: 10px;
            background: #F8FAFC;
        }
        .file-list-item {
            display: flex; align-items: center; gap: 8px;
            padding: 7px 12px; font-size: 12px; font-weight: 500; color: #43474e;
            border-bottom: 1px solid #f1f3f4;
        }
        .file-list-item:last-child { border-bottom: none; }
        .file-list-item .file-ext {
            font-size: 10px; font-weight: 700; padding: 1px 5px; border-radius: 4px; flex-shrink: 0;
        }
        .file-ext-pdf   { background: #ffdad6; color: #ba1a1a; }
        .file-ext-sor   { background: #d5e3ff; color: #1a56db; }
        .file-ext-other { background: #f1f3f4; color: #74777f; }

        /* ── Mode buttons (replace/add) ── */
        .mode-btn-group { display: flex; gap: 8px; flex-wrap: wrap; }
        .mode-btn {
            flex: 1; min-width: 120px; padding: 9px 16px;
            border: 2px solid #E2E8F0; border-radius: 8px;
            font-size: 13px; font-weight: 700; cursor: pointer;
            transition: border-color 0.15s, background 0.15s, color 0.15s;
            background: #fff; color: #43474e; font-family: inherit; text-align: center;
        }
        .mode-btn:hover { border-color: #adc8f5; background: #F8FAFC; color: #022448; }
        .mode-btn.active-replace { border-color: #ffb4ab; background: #ffdad6; color: #ba1a1a; }
        .mode-btn.active-add     { border-color: #ceead6; background: #e6f4ea; color: #137333; }

        /* ── Drop zone ── */
        .drop-zone {
            border: 2px dashed #c4c6cf; border-radius: 12px; padding: 24px 16px;
            text-align: center; cursor: pointer; transition: border-color 0.15s, background 0.15s;
            background: #F8FAFC; position: relative;
        }
        .drop-zone:hover, .drop-zone.dz-over { border-color: #1a56db; background: rgba(26,86,219,0.04); }
        .drop-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

        /* ── File count display ── */
        .count-display {
            display: flex; align-items: center; gap: 8px;
            padding: 8px 12px; border-radius: 10px;
            font-size: 13px; font-weight: 700;
        }
        .count-ok      { background: #e6f4ea; color: #137333; }
        .count-warn    { background: #fff8e1; color: #b06000; }
        .count-neutral { background: #f1f3f4; color: #43474e; }

        /* ── Warning banner ── */
        .warn-banner {
            background: #fff8e1; border: 1px solid #fde68a;
            border-radius: 10px; padding: 12px 16px;
            font-size: 13px; font-weight: 600; color: #b06000;
            display: flex; align-items: flex-start; gap: 8px;
        }

        /* ── Form label ── */
        .form-lbl { font-size: 12px; font-weight: 600; color: #43474e; display: block; margin-bottom: 6px; }
        .form-inp {
            border: 1.5px solid #E2E8F0; border-radius: 8px;
            padding: 10px 12px; font-size: 14px; font-weight: 500; color: #191c1e;
            background: #F8FAFC; outline: none;
            transition: border-color 0.15s, background 0.15s;
            width: 100%; font-family: inherit;
        }
        .form-inp:focus { border-color: #022448; background: #fff; box-shadow: 0 0 0 3px rgba(2,36,72,0.08); }

        /* ── Upload button ── */
        .otdr-upload-btn {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            width: 100%; padding: 14px 20px;
            background: #022448; color: #fff;
            border: none; border-radius: 8px;
            font-size: 14px; font-weight: 700; cursor: pointer;
            transition: background 0.15s, transform 0.1s; font-family: inherit;
            min-height: 48px;
        }
        .otdr-upload-btn:hover:not(:disabled) { background: #1e3a5f; transform: translateY(-1px); }
        .otdr-upload-btn:active:not(:disabled) { transform: scale(0.98); }
        .otdr-upload-btn:disabled { background: #74777f; cursor: not-allowed; }

        /* ── Status message ── */
        .upload-status-msg {
            font-size: 13px; font-weight: 600;
            padding: 10px 14px; border-radius: 10px; text-align: center;
        }
        .upload-ok   { background: #e6f4ea; color: #137333; }
        .upload-err  { background: #ffdad6; color: #ba1a1a; }
        .upload-warn { background: #fff8e1; color: #b06000; }

        /* ── Section heading ── */
        .section-h4 { font-size: 13px; font-weight: 700; color: #43474e; margin-bottom: 10px; }

        /* ── Selected files list ── */
        .sel-file-list { display: flex; flex-direction: column; gap: 4px; margin-top: 10px; }
        .sel-file-item {
            display: flex; align-items: center; gap: 8px;
            background: #f1f3f4; border-radius: 8px;
            padding: 6px 10px; font-size: 12px; font-weight: 500; color: #43474e;
        }
        .sel-file-item .remove-sel {
            margin-left: auto; color: #74777f; cursor: pointer; transition: color 0.12s; flex-shrink: 0;
        }
        .sel-file-item .remove-sel:hover { color: #ba1a1a; }

        /* ── Choice cards ── */
        .choice-card {
            display: flex; flex-direction: column; align-items: center; gap: 8px;
            padding: 28px 20px; border-radius: 12px; border: 1px solid #E2E8F0;
            background: #fff; cursor: pointer; transition: all 0.2s; text-align: center;
        }
        .choice-card:hover { border-color: #022448; box-shadow: 0 4px 16px rgba(2,36,72,0.10); transform: translateY(-2px); }
        .choice-card:active { transform: scale(0.98); }
        .choice-icon  { font-size: 32px; }
        .choice-label { font-size: 15px; font-weight: 700; color: #191c1e; }
        .choice-desc  { font-size: 12px; color: #74777f; }

        /* ── Secondary button ── */
        .btn-secondary {
            padding: 12px 20px; border-radius: 8px; font-size: 14px; font-weight: 600;
            background: transparent; color: #43474e; border: 1.5px solid #E2E8F0;
            cursor: pointer; transition: all 0.2s; text-align: center; font-family: inherit;
            min-height: 48px;
        }
        .btn-secondary:hover { background: #f1f3f4; border-color: #c4c6cf; }

        /* ── Remove appointment button ── */
        .btn-remove-termin {
            width: 100%; padding: 8px; border-radius: 8px; font-size: 13px; font-weight: 500;
            background: transparent; color: #ba1a1a; border: 1px solid #ffb4ab;
            cursor: pointer; transition: all 0.2s; text-align: center; font-family: inherit;
        }
        .btn-remove-termin:hover { background: #ffdad6; }

        /* ── Layout helpers ── */
        @media (min-width: 768px) {
            #app-shell { margin-left: 240px; }
            #mobile-bottom-nav { display: none !important; }
        }
        @media (max-width: 767px) {
            #sidebar { display: none !important; }
            #app-shell { padding-bottom: 72px; }
        }
    </style>
</head>

<!-- Wire sidebar superadmin + logout + mobile nav back -->
<script>
(function() {
    var role = localStorage.getItem('userRole');
    if (role === 'superadmin') {
        var adminLink    = document.getElementById('sidebarAdminLink');
        var superLogLink = document.getElementById('sidebarSuperLogLink');
        if (adminLink)    adminLink.style.display    = '';
        if (superLogLink) superLogLink.style.display = '';
    }
    function doLogout() { localStorage.clear(); window.location.href = 'login.html'; }
    var sidebarLogout = document.getElementById('sidebarLogoutBtn');
    var mobileLogout  = document.getElementById('mobileLogoutBtn');
    if (sidebarLogout) sidebarLogout.addEventListener('click', doLogout);
    if (mobileLogout)  mobileLogout.addEventListener('click', doLogout);
    // Mobile back mirrors #backBtn (set by otdr.js)
    var mobileBack = document.getElementById('mobileBackBtn');
    if (mobileBack) {
        mobileBack.addEventListener('click', function() {
            var btn = document.getElementById('backBtn');
            if (btn && btn.onclick) btn.onclick();
            else window.history.back();
        });
    }
})();
</script>
