<body class="bg-background min-h-screen flex items-center justify-center px-4 md:px-0">

            </p>

<form class="space-y-8 flex flex-col items-center">
<!-- OTP Inputs -->
<div class="flex justify-between w-full max-w-[340px] gap-2">
<input aria-label="Digit 1" class="w-12 h-14 text-center font-headline-sm text-headline-sm bg-surface-container-lowest border border-outline-variant rounded-lg text-on-surface focus:outline-none focus:ring-2 focus:ring-primary-container focus:border-primary-container transition-all" maxlength="1" type="text" value="8"/>
<input aria-label="Digit 2" class="w-12 h-14 text-center font-headline-sm text-headline-sm bg-surface-container-lowest border border-outline-variant rounded-lg text-on-surface focus:outline-none focus:ring-2 focus:ring-primary-container focus:border-primary-container transition-all" maxlength="1" type="text" value="2"/>
<input aria-label="Digit 3" class="w-12 h-14 text-center font-headline-sm text-headline-sm bg-surface-container-lowest border border-outline-variant rounded-lg text-on-surface focus:outline-none focus:ring-2 focus:ring-primary-container focus:border-primary-container transition-all" maxlength="1" type="text" value="4"/>

</div>
<!-- Primary Action -->
<button class="w-full bg-primary text-on-primary font-label-md text-label-md py-3 rounded-lg hover:bg-primary/90 transition-colors flex items-center justify-center gap-2" type="button">
                Verify
            </button>
</form>
