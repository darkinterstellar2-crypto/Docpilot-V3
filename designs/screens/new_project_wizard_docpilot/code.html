<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>New Project Wizard</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Config -->
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-bright": "#f7f9fb",
                    "on-secondary": "#ffffff",
                    "on-primary": "#ffffff",
                    "tertiary-container": "#31394e",
                    "on-tertiary-fixed": "#131b2e",
                    "tertiary-fixed": "#dae2fd",
                    "surface-tint": "#455f87",
                    "secondary-container": "#fea619",
                    "outline": "#74777f",
                    "primary": "#022448",
                    "on-surface": "#191c1e",
                    "on-error-container": "#93000a",
                    "on-secondary-fixed-variant": "#653e00",
                    "on-primary-container": "#8aa4cf",
                    "on-primary-fixed-variant": "#2d486d",
                    "surface": "#f7f9fb",
                    "on-tertiary-fixed-variant": "#3f465c",
                    "inverse-on-surface": "#eff1f3",
                    "surface-container-highest": "#e0e3e5",
                    "on-background": "#191c1e",
                    "on-tertiary": "#ffffff",
                    "primary-fixed-dim": "#adc8f5",
                    "on-tertiary-container": "#9ba3bb",
                    "surface-container": "#eceef0",
                    "on-secondary-container": "#684000",
                    "outline-variant": "#c4c6cf",
                    "secondary-fixed": "#ffddb8",
                    "tertiary-fixed-dim": "#bec6e0",
                    "surface-container-lowest": "#ffffff",
                    "on-surface-variant": "#43474e",
                    "on-error": "#ffffff",
                    "inverse-surface": "#2d3133",
                    "error": "#ba1a1a",
                    "secondary": "#855300",
                    "primary-container": "#1e3a5f",
                    "on-secondary-fixed": "#2a1700",
                    "background": "#f7f9fb",
                    "primary-fixed": "#d5e3ff",
                    "surface-container-low": "#f2f4f6",
                    "surface-variant": "#e0e3e5",
                    "tertiary": "#1c2337",
                    "error-container": "#ffdad6",
                    "on-primary-fixed": "#001c3b",
                    "inverse-primary": "#adc8f5",
                    "surface-container-high": "#e6e8ea",
                    "surface-dim": "#d8dadc",
                    "secondary-fixed-dim": "#ffb95f"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "stack-sm": "0.5rem",
                    "stack-lg": "1.5rem",
                    "stack-md": "1rem",
                    "gutter": "1.5rem",
                    "sidebar-width": "240px",
                    "container-padding": "2rem"
            },
            "fontFamily": {
                    "body-md": ["Inter"],
                    "label-sm": ["Inter"],
                    "body-lg": ["Inter"],
                    "headline-md": ["Inter"],
                    "headline-lg": ["Inter"],
                    "label-md": ["Inter"],
                    "headline-sm": ["Inter"],
                    "body-sm": ["Inter"]
            },
            "fontSize": {
                    "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "600"}],
                    "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                    "headline-md": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                    "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "label-md": ["14px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                    "headline-sm": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                    "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}]
            }
          }
        }
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background min-h-screen flex items-center justify-center p-gutter">
<!-- Suppressed Navigation Shells: Since this is a linear/transactional wizard screen, global navigation is deliberately hidden to prioritize the focused task canvas. -->
<!-- Main Wizard Card -->
<main class="w-full max-w-2xl bg-surface-container-lowest rounded-xl border border-outline-variant shadow-sm p-container-padding flex flex-col gap-stack-lg">
<!-- Header & Progress Indicator -->
<header class="flex flex-col gap-stack-md border-b border-outline-variant pb-stack-md">
<h1 class="font-headline-md text-headline-md text-primary">New Project Wizard</h1>
<div class="flex items-center justify-between px-4">
<!-- Step 1 (Active) -->
<div class="flex flex-col items-center gap-2">
<div class="w-8 h-8 rounded-full bg-primary text-on-primary flex items-center justify-center font-label-md text-label-md ring-4 ring-primary/10">
                        1
                    </div>
<span class="font-label-sm text-label-sm text-primary">Setup</span>
</div>
<div class="flex-1 h-[2px] bg-outline-variant mx-4"></div>
<!-- Step 2 (Inactive) -->
<div class="flex flex-col items-center gap-2">
<div class="w-8 h-8 rounded-full bg-surface-variant text-on-surface-variant flex items-center justify-center font-label-md text-label-md">
                        2
                    </div>
<span class="font-label-sm text-label-sm text-on-surface-variant">Details</span>
</div>
<div class="flex-1 h-[2px] bg-outline-variant mx-4"></div>
<!-- Step 3 (Inactive) -->
<div class="flex flex-col items-center gap-2">
<div class="w-8 h-8 rounded-full bg-surface-variant text-on-surface-variant flex items-center justify-center font-label-md text-label-md">
                        3
                    </div>
<span class="font-label-sm text-label-sm text-on-surface-variant">Review</span>
</div>
</div>
</header>
<!-- Form Content -->
<form class="flex flex-col gap-stack-lg">
<!-- Project Name Input -->
<div class="flex flex-col gap-stack-sm">
<label class="font-label-md text-label-md text-on-surface" for="projectName">Project Name</label>
<div class="flex items-center w-full bg-surface-container-lowest rounded-lg border border-outline-variant focus-within:border-primary focus-within:ring-1 focus-within:ring-primary overflow-hidden transition-colors">
<input class="w-full bg-transparent border-none outline-none p-3 font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/70 focus:ring-0" id="projectName" placeholder="Enter project designation" type="text"/>
</div>
</div>
<!-- Locations Tag Input -->
<div class="flex flex-col gap-stack-sm">
<label class="font-label-md text-label-md text-on-surface" for="locationsInput">Locations</label>
<div class="flex flex-wrap items-center gap-2 w-full bg-surface-container-lowest rounded-lg border border-outline-variant focus-within:border-primary focus-within:ring-1 focus-within:ring-primary p-2 transition-colors min-h-[48px]">
<!-- Tag: NVT01 -->
<span class="inline-flex items-center gap-1 bg-primary-container text-on-primary-container rounded-full px-3 py-1 font-label-sm text-label-sm">
                        NVT01
                        <span class="material-symbols-outlined text-[16px] cursor-pointer hover:opacity-80" data-icon="close">close</span>
</span>
<!-- Tag: NVT03 -->
<span class="inline-flex items-center gap-1 bg-primary-container text-on-primary-container rounded-full px-3 py-1 font-label-sm text-label-sm">
                        NVT03
                        <span class="material-symbols-outlined text-[16px] cursor-pointer hover:opacity-80" data-icon="close">close</span>
</span>
<!-- Input for new tags -->
<input class="flex-1 min-w-[120px] bg-transparent border-none outline-none py-1 px-2 font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/70 focus:ring-0" id="locationsInput" placeholder="Add location..." type="text"/>
</div>
<p class="font-body-sm text-body-sm text-on-surface-variant">Press Enter or comma to add a new location tag.</p>
</div>
<!-- Start Date Picker -->
<div class="flex flex-col gap-stack-sm">
<label class="font-label-md text-label-md text-on-surface" for="startDate">Start Date</label>
<div class="flex items-center w-full max-w-xs bg-surface-container-lowest rounded-lg border border-outline-variant focus-within:border-primary focus-within:ring-1 focus-within:ring-primary overflow-hidden transition-colors">
<span class="material-symbols-outlined pl-3 text-on-surface-variant" data-icon="calendar_today">calendar_today</span>
<input class="w-full bg-transparent border-none outline-none p-3 font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/70 focus:ring-0 [&amp;::-webkit-calendar-picker-indicator]:opacity-0 [&amp;::-webkit-calendar-picker-indicator]:absolute [&amp;::-webkit-calendar-picker-indicator]:w-full [&amp;::-webkit-calendar-picker-indicator]:h-full [&amp;::-webkit-calendar-picker-indicator]:cursor-pointer relative" id="startDate" type="date"/>
</div>
</div>
</form>
<!-- Footer Actions -->
<footer class="flex items-center justify-end gap-stack-md pt-stack-md mt-stack-sm border-t border-outline-variant">
<button class="px-6 py-2 rounded-lg border border-outline font-label-md text-label-md text-primary bg-transparent hover:bg-surface-variant/50 transition-colors" type="button">
                Cancel
            </button>
<button class="px-6 py-2 rounded-lg font-label-md text-label-md text-on-primary bg-primary hover:bg-primary/90 transition-colors flex items-center gap-2" type="button">
                Next
                <span class="material-symbols-outlined text-[18px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</footer>
</main>
</body></html>
