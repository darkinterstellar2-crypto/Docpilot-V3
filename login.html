<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DocPilot - Sign In</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="src/css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        gray: { 50: '#f9fafb', 100: '#f3f4f6', 200: '#e5e7eb', 300: '#d1d5db', 800: '#1f2937', 900: '#111827' }
                    }
                }
            }
        }
    </script>
    <style>
        body { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
        .btn-primary { background-color: #111827; color: white; transition: all 0.2s; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .btn-primary:hover { background-color: #374151; transform: translateY(-1px); }
        .input-field { background: #fff; border: 1px solid #e5e7eb; transition: all 0.2s; }
        .input-field:focus { border-color: #111827; box-shadow: 0 0 0 1px #111827; outline: none; }
        .auth-card { background: #ffffff; border: 1px solid #e5e7eb; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01); }
    </style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-[100dvh] p-4 selection:bg-gray-200">

    <div class="w-full max-w-sm auth-card rounded-2xl sm:rounded-3xl p-8 sm:p-10 flex flex-col gap-8 animate-fade-in relative z-10">
        
        <!-- Header -->
        <div class="text-center flex flex-col items-center">
            <div class="w-12 h-12 bg-gray-900 rounded-xl flex items-center justify-center mb-5 shadow-sm">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
            </div>
            <h1 class="text-2xl font-black text-gray-900 tracking-tight uppercase">DocPilot</h1>
            <p class="text-gray-500 text-[10px] font-bold mt-1.5 tracking-widest uppercase">Fiber Management</p>
        </div>

        <!-- Form -->
        <form id="loginForm" class="flex flex-col gap-5 mt-2">
            <div>
                <label class="block text-gray-700 text-xs font-semibold mb-2 tracking-wide" data-i18n="auth.usernameOrEmail">Username or Email</label>
                <input type="text" id="loginId" required placeholder="username or email" class="input-field w-full px-4 py-3 rounded-xl text-sm font-medium text-gray-900 placeholder-gray-400">
            </div>

            <div>
                <div class="flex justify-between items-center mb-2">
                    <label class="block text-gray-700 text-xs font-semibold tracking-wide" data-i18n="auth.password">Password</label>
                </div>
                <div class="relative">
                    <input type="password" id="loginPass" required placeholder="••••••••" class="input-field w-full px-4 py-3 pr-12 rounded-xl text-sm font-medium text-gray-900 placeholder-gray-400">
                    <button type="button" onclick="togglePass()" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-700 transition-colors p-1" tabindex="-1">
                        <svg id="eyeIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                        <svg id="eyeOffIcon" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/></svg>
                    </button>
                </div>
            </div>

            <button type="submit" class="w-full btn-primary font-semibold py-3.5 rounded-xl mt-4 text-sm tracking-wide">
                Sign In
            </button>
        </form>

        <!-- Footer -->
        <div class="text-center pt-2 mt-2">
            <p class="text-gray-500 text-sm font-medium">
                Need access? 
                <a href="register.html" class="text-gray-900 font-bold hover:underline ml-1">Create Account</a>
            </p>
        </div>
    </div>
    
    <script>
        function togglePass() {
            const p = document.getElementById('loginPass');
            const on = document.getElementById('eyeIcon');
            const off = document.getElementById('eyeOffIcon');
            const show = p.type === 'password';
            p.type = show ? 'text' : 'password';
            on.classList.toggle('hidden', show);
            off.classList.toggle('hidden', !show);
        }
    </script>
    <script src="src/js/api.js"></script>
    <script src="src/js/auth.js"></script>
<script src="src/js/i18n.js"></script>
</body>
</html>
