<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DocPilot — Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="src/css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        gray: { 50:'#f9fafb',100:'#f3f4f6',200:'#e5e7eb',300:'#d1d5db',800:'#1f2937',900:'#111827' }
                    }
                }
            }
        }
    </script>
    <style>
        body { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; background: #f9fafb; }
        ::-webkit-scrollbar { width: 4px; background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 4px; }

        /* ── Header ── */
        .glass-header {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-bottom: 1px solid rgba(0,0,0,0.06);
        }

        /* ── Glass Card ── */
        .glass-card {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.7);
            border-radius: 14px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
            padding: 16px;
        }

        /* ── Timeline ── */
        .timeline-container {
            position: relative;
            overflow-y: auto;
            max-height: calc(100vh - 280px);
            min-height: 400px;
        }
        .timeline-grid {
            position: relative;
            min-height: 1280px; /* 16 hours × 80px per hour */
        }
        .hour-line {
            position: absolute;
            left: 0; right: 0;
            border-top: 1px solid #f0f0f0;
            display: flex;
            align-items: flex-start;
        }
        .hour-label {
            font-size: 11px;
            font-weight: 600;
            color: #9ca3af;
            width: 44px;
            padding-right: 8px;
            text-align: right;
            line-height: 1;
            flex-shrink: 0;
            margin-top: -6px;
        }
        .hour-events-zone {
            flex: 1;
            position: relative;
        }

        /* ── Appointment blocks ── */
        .appt-block {
            position: absolute;
            border-radius: 10px;
            padding: 10px 12px;
            cursor: pointer;
            overflow: hidden;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
            box-sizing: border-box;
            min-height: 48px;
        }
        .appt-block:hover {
            transform: translateX(2px) scale(1.01);
            box-shadow: 0 4px 16px rgba(0,0,0,0.12) !important;
            z-index: 10;
        }
        .appt-block.expanded {
            z-index: 20;
        }
        .appt-buffer {
            position: absolute;
            left: 0; right: 0;
            border-radius: 4px;
            opacity: 0.07;
            pointer-events: none;
        }

        /* ── Week bar ── */
        .week-day-btn {
            flex: 1;
            padding: 8px 4px;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
            border: 2px solid transparent;
            background: transparent;
        }
        .week-day-btn:hover { background: #f3f4f6; }
        .week-day-btn.active { background: #111827; color: white; border-color: #111827; }
        .week-day-btn.has-appts .appt-badge {
            display: inline-flex;
        }
        .appt-badge {
            display: none;
            width: 18px; height: 18px;
            border-radius: 50%;
            font-size: 10px;
            font-weight: 700;
            align-items: center;
            justify-content: center;
            margin: 2px auto 0;
        }

        /* ── Filter ── */
        .filter-select {
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 6px 12px;
            font-size: 13px;
            font-weight: 500;
            color: #374151;
            cursor: pointer;
            outline: none;
        }
        .filter-select:focus { border-color: #6b7280; }

        /* ── Nav buttons ── */
        .nav-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px; height: 32px;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
            background: white;
            cursor: pointer;
            font-size: 16px;
            color: #374151;
            transition: background 0.15s, border-color 0.15s;
        }
        .nav-btn:hover { background: #f3f4f6; border-color: #d1d5db; }

        .today-btn {
            padding: 4px 12px;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
            background: white;
            font-size: 13px;
            font-weight: 600;
            color: #374151;
            cursor: pointer;
            transition: background 0.15s;
        }
        .today-btn:hover { background: #f3f4f6; }

        /* ── Empty state ── */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            color: #9ca3af;
        }

        /* ── Module color dots ── */
        .mod-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; display: inline-block; }
    </style>
</head>
<body class="font-sans text-gray-900">

    <!-- Header -->
    <header class="glass-header sticky top-0 z-50 px-4 py-3">
        <div class="max-w-4xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <button onclick="history.back()" class="flex items-center gap-1 text-sm text-gray-500 hover:text-gray-900 transition-colors font-medium">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                    </svg>
                    Back
                </button>
                <div class="w-px h-4 bg-gray-200"></div>
                <div>
                    <h1 class="text-base font-bold text-gray-900 leading-tight">📅 Planner</h1>
                    <p id="projectLabel" class="text-xs text-gray-400 font-medium leading-none mt-0.5"></p>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <select id="moduleFilter" class="filter-select">
                    <option value="">All Modules</option>
                </select>
            </div>
        </div>
    </header>

    <!-- Main -->
    <main class="max-w-4xl mx-auto px-4 py-4">

        <!-- Date Navigation -->
        <div class="glass-card mb-3">
            <div class="flex items-center justify-between gap-2">
                <div class="flex items-center gap-2">
                    <button id="prevDayBtn" class="nav-btn">‹</button>
                    <button id="nextDayBtn" class="nav-btn">›</button>
                    <button id="todayBtn" class="today-btn">Today</button>
                </div>
                <div class="flex-1 text-center">
                    <span id="currentDateLabel" class="text-base font-bold text-gray-900"></span>
                    <span id="currentDayOfWeek" class="text-sm text-gray-400 ml-1"></span>
                </div>
                <div>
                    <input type="date" id="datePicker" class="filter-select" style="cursor:pointer;">
                </div>
            </div>
        </div>

        <!-- Week Overview Bar -->
        <div class="glass-card mb-3 p-3">
            <div id="weekBar" class="flex gap-1">
                <!-- 7 day buttons injected by JS -->
            </div>
        </div>

        <!-- Loading State -->
        <div id="plannerLoading" class="glass-card text-center py-8 text-gray-400 text-sm">
            Loading appointments…
        </div>

        <!-- Timeline -->
        <div id="plannerContent" class="hidden">
            <div class="glass-card p-0 overflow-hidden">
                <div class="timeline-container" id="timelineContainer">
                    <div class="timeline-grid" id="timelineGrid">
                        <!-- Injected by JS -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Empty state -->
        <div id="plannerEmpty" class="hidden glass-card">
            <div class="empty-state">
                <span class="text-4xl mb-3">📭</span>
                <p class="text-base font-semibold text-gray-500">No appointments for this day</p>
                <p class="text-xs text-gray-400 mt-1">Schedule appointments in Einblasen or APL modules.</p>
            </div>
        </div>

        <!-- Error state -->
        <div id="plannerError" class="hidden glass-card text-center py-8 text-red-400 text-sm"></div>

    </main>

    <!-- Appointment Detail Panel (slide-in) -->
    <div id="apptDetailPanel" class="hidden fixed inset-0 z-[100] flex items-end justify-center p-0 sm:items-center sm:p-4" style="background:rgba(0,0,0,0.3); backdrop-filter:blur(4px);">
        <div id="apptDetailBox" class="w-full max-w-lg rounded-t-2xl sm:rounded-2xl bg-white shadow-2xl p-5 max-h-[85vh] overflow-y-auto">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-base font-bold text-gray-900">Appointment Details</h2>
                <button id="closeDetailBtn" class="text-gray-400 hover:text-gray-700 text-xl font-bold">×</button>
            </div>
            <div id="apptDetailContent"></div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="src/js/api.js?v=20260414a"></script>
    <script src="src/js/force-logout.js?v=20260414a"></script>
    <script src="src/js/i18n.js?v=20260414a"></script>
    <script src="src/js/modal.js?v=20260414a"></script>
    <script src="src/js/logout.js?v=20260414a"></script>
    <script src="src/js/header-avatar.js?v=20260414a"></script>
    <script src="src/js/planner.js?v=20260414a"></script>
<script src="src/js/idle-logout.js?v=20260414a"></script>
</body>
</html>
