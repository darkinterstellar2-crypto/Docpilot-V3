        async function fpLoadAndRenderTree() {
            try {
                const res = await fetch('/api/files/tree?project=' + enc(projectName));
                const data = await res.json();
                if (!data.success) {
                    document.getElementById('folderPickerTree').innerHTML =
                        '<div class="py-8 text-center text-red-400 text-sm font-medium">Failed to load folders</div>';
                    return;
                }
                _fpTreeData = data.tree;
                fpRenderTree();
            } catch (e) {
                document.getElementById('folderPickerTree').innerHTML =
                    '<div class="py-8 text-center text-red-400 text-sm font-medium">Error: ' + esc(e.message) + '</div>';
            }
        }

        function fpRenderTree() {
            const container = document.getElementById('folderPickerTree');
            container.innerHTML = '';
            if (!_fpTreeData) return;
            fpRenderNode(_fpTreeData, container, 0);
        }

        function fpRenderNode(node, parentEl, depth) {
            const hasChildren = node.children && node.children.length > 0;

            // Build full path for this node
            const nodePath = node.path !== undefined ? node.path : '';

            // Determine disabled state
            // Only disable the item being moved/copied and its descendants
            // The current folder (parent) should remain selectable so siblings are reachable
            let disabled = false;
            if (_fpBatchItems) {
                // Batch mode: disable each selected item's own path + descendants
                for (const bItem of _fpBatchItems) {
                    const itemFullPath = (currentPath ? currentPath + '/' : '') + bItem.name;
                    if (bItem.isDir && nodePath === itemFullPath) disabled = true;
                    if (bItem.isDir && nodePath.startsWith(itemFullPath + '/')) disabled = true;
                }
            } else {
                // Single-item mode: disable the item itself + descendants
                const itemFullPath = (currentPath ? currentPath + '/' : '') + _fpItem.name;
                if (_fpItem.isDir && nodePath === itemFullPath) disabled = true;
                if (_fpItem.isDir && nodePath.startsWith(itemFullPath + '/')) disabled = true;
            }

            const wrapper = document.createElement('div');

            const row = document.createElement('div');
            row.className = 'folder-tree-item'
                + (disabled ? ' fp-disabled' : '')
                + (_fpSelectedPath === nodePath ? ' selected' : '');
            row.style.paddingLeft = (10 + depth * 16) + 'px';

            // Chevron
            const chevron = document.createElement('span');
            chevron.className = 'folder-tree-chevron'
                + (hasChildren ? (depth === 0 ? ' chev-open' : '') : ' chev-leaf');
            chevron.innerHTML = '<svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"></path></svg>';

            // Folder icon
            const icon = document.createElement('span');
            icon.className = 'shrink-0';
            icon.innerHTML = '<svg class="w-4 h-4 text-amber-400" fill="currentColor" viewBox="0 0 24 24"><path d="M10 4H4a2 2 0 00-2 2v12a2 2 0 002 2h16a2 2 0 002-2V8a2 2 0 00-2-2h-8l-2-2z"/></svg>';

            // Label
            const label = document.createElement('span');
            label.className = 'flex-1 truncate';
            label.textContent = depth === 0 ? 'Root' : node.name;

            row.appendChild(chevron);
            row.appendChild(icon);
            row.appendChild(label);

            // Children container — root auto-expanded
            const childrenEl = document.createElement('div');
            childrenEl.className = 'folder-tree-children' + (depth === 0 ? ' chev-open' : '');

            // Chevron click: toggle children
            if (hasChildren) {
                chevron.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const isOpen = childrenEl.classList.contains('chev-open');
                    if (isOpen) {
                        childrenEl.classList.remove('chev-open');
                        chevron.classList.remove('chev-open');
                    } else {
                        childrenEl.classList.add('chev-open');
                        chevron.classList.add('chev-open');
                    }
                });
            }

            // Row click: select folder
            if (!disabled) {
                row.addEventListener('click', function(e) {
                    if (e.target.closest('.folder-tree-chevron')) return;
                    document.querySelectorAll('#folderPickerTree .folder-tree-item.selected')
                        .forEach(function(el) { el.classList.remove('selected'); });
                    row.classList.add('selected');
                    _fpSelectedPath = nodePath;
                    const displayPath = nodePath === '' ? 'Root' : nodePath;
                    document.getElementById('folderPickerSelectedPath').textContent = displayPath;
                    // Clear any lingering error
                    document.getElementById('folderPickerError').classList.add('hidden');
                });
            }

            wrapper.appendChild(row);
            wrapper.appendChild(childrenEl);
            parentEl.appendChild(wrapper);

            // Render children
            if (hasChildren) {
                node.children.forEach(function(child) {
                    fpRenderNode(child, childrenEl, depth + 1);
                });
            }
        }

        window.createFolderInPicker = async function() {
            const nameInput = document.getElementById('folderPickerNewName');
            const name = nameInput.value.trim();
            if (!name) { nameInput.focus(); return; }
            const targetPath = _fpSelectedPath !== null ? _fpSelectedPath : '';
            const errorEl = document.getElementById('folderPickerError');
            errorEl.classList.add('hidden');
            try {
                const res = await fetch('/api/files/folder?project=' + enc(projectName) + '&path=' + enc(targetPath), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'x-user-email': userEmail },
                    body: JSON.stringify({ name })
                });
                const data = await res.json();
                if (!data.success) {
                    errorEl.textContent = 'Failed to create folder: ' + (data.message || 'Unknown error');
                    errorEl.classList.remove('hidden');
                    return;
                }
                nameInput.value = '';
                const newPath = (targetPath ? targetPath + '/' : '') + name;
                _fpSelectedPath = newPath;
                await fpLoadAndRenderTree();
                document.getElementById('folderPickerSelectedPath').textContent = newPath;
            } catch (e) {
                errorEl.textContent = 'Error: ' + e.message;
                errorEl.classList.remove('hidden');
            }
        };

        // Enter key in folder name input triggers create
        document.getElementById('folderPickerNewName').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') { e.preventDefault(); createFolderInPicker(); }
        });

        window.confirmCopyMove = async function() {
            const errorEl = document.getElementById('folderPickerError');
            if (_fpSelectedPath === null) {
                errorEl.textContent = 'Please select a destination folder first.';
                errorEl.classList.remove('hidden');
                return;
            }
            const confirmBtn = document.getElementById('folderPickerConfirm');
            errorEl.classList.add('hidden');
            const destination = _fpSelectedPath;
            const endpoint = _fpMode === 'copy' ? '/api/files/copy' : '/api/files/move';
            confirmBtn.disabled = true;
            const origText = confirmBtn.textContent;
            confirmBtn.textContent = _fpMode === 'copy' ? 'Copying\u2026' : 'Moving\u2026';
            try {
                if (_fpBatchItems) {
                    // ── Batch mode ──
                    const errors = [];
                    for (const bItem of _fpBatchItems) {
                        const source = (currentPath ? currentPath + '/' : '') + bItem.name;
                        const res = await fetch(endpoint + '?project=' + enc(projectName), {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json', 'x-user-email': userEmail, 'x-user-role': userRole },
                            body: JSON.stringify({ source, destination })
                        });
                        const data = await res.json();
                        if (!data.success) errors.push(bItem.name + ': ' + (data.message || 'Failed'));
                    }
                    document.getElementById('folderPickerBackdrop').classList.add('hidden');
                    if (errors.length > 0) {
                        errorEl.textContent = 'Some items failed: ' + errors.join('; ');
                        errorEl.classList.remove('hidden');
                        confirmBtn.disabled = false;
                        confirmBtn.textContent = origText;
                    } else {
                        fpShowSuccessToast('\u2713 ' + (_fpMode === 'copy' ? 'Copied' : 'Moved') + ' ' + _fpBatchItems.length + ' item' + (_fpBatchItems.length > 1 ? 's' : '') + ' successfully');
                    }
                    clearSelection();
                    loadFiles();
                } else {
                    // ── Single-item mode ──
                    const source = (currentPath ? currentPath + '/' : '') + _fpItem.name;
                    const res = await fetch(endpoint + '?project=' + enc(projectName), {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'x-user-email': userEmail, 'x-user-role': userRole },
                        body: JSON.stringify({ source, destination })
                    });
                    const data = await res.json();
                    if (!data.success) {
                        errorEl.textContent = data.message || 'Operation failed.';
                        errorEl.classList.remove('hidden');
                        confirmBtn.disabled = false;
                        confirmBtn.textContent = origText;
                        return;
                    }
                    document.getElementById('folderPickerBackdrop').classList.add('hidden');
                    loadFiles();
                    fpShowSuccessToast(_fpMode === 'copy'
                        ? '\u2713 Copied \u201c' + _fpItem.name + '\u201d successfully'
                        : '\u2713 Moved \u201c' + _fpItem.name + '\u201d successfully');
                }
            } catch (e) {
                errorEl.textContent = 'Error: ' + e.message;
                errorEl.classList.remove('hidden');
                confirmBtn.disabled = false;
                confirmBtn.textContent = origText;
            }
        };

        // ─── Batch Copy/Move (opens folder picker in batch mode) ────────────
        window.batchCopyMove = function(mode) {
            const items = Array.from(selectedItems).map(name => {
                return currentItems.find(i => i.name === name) || { name, isDir: false };
            });
            if (items.length === 0) return;

            _fpBatchItems = items;
            _fpItem = null;
            _fpMode = mode;
            _fpSelectedPath = null;
            _fpTreeData = null;

            const title = document.getElementById('folderPickerTitle');
            const confirmBtn = document.getElementById('folderPickerConfirm');
            const errorEl = document.getElementById('folderPickerError');
            const newNameInput = document.getElementById('folderPickerNewName');

            const count = items.length;
            title.textContent = mode === 'copy'
                ? 'Copy ' + count + ' item' + (count > 1 ? 's' : '') + ' to\u2026'
                : 'Move ' + count + ' item' + (count > 1 ? 's' : '') + ' to\u2026';
            confirmBtn.textContent = mode === 'copy' ? 'Copy Here' : 'Move Here';
            confirmBtn.disabled = false;
            errorEl.classList.add('hidden');
            errorEl.textContent = '';
            newNameInput.value = '';
            document.getElementById('folderPickerSelectedPath').textContent = 'No folder selected';
            document.getElementById('folderPickerTree').innerHTML = '<div class="py-8 text-center text-gray-400 text-sm">Loading folders\u2026</div>';
            document.getElementById('folderPickerBackdrop').classList.remove('hidden');

            fpLoadAndRenderTree();
        };

        function fpShowSuccessToast(msg) {
            const toast = document.getElementById('uploadToast');
            const status = document.getElementById('toastStatusText');
            const pct = document.getElementById('toastPct');
            const bar = document.getElementById('toastBar');
            status.textContent = msg;
            pct.textContent = '';
            bar.style.width = '100%';
            toast.classList.remove('hidden');
            setTimeout(function() {
                toast.classList.add('hidden');
                bar.style.width = '0%';
            }, 2500);
        }

        // ─── Cut / Clipboard ─────────────────────────────────────────
        function updateClipboardUI() {
            const pill = document.getElementById('clipboardPill');
            if (!_clipboard) {
                pill.style.display = 'none';
                return;
            }
            // Only show paste option when in a different folder than source
            if (_clipboard.path === currentPath) {
                pill.style.display = 'none';
                return;
            }
            document.getElementById('clipboardPillName').textContent = _clipboard.name;
            pill.style.display = 'flex';
        }

        window.cutItem = function(item) {
            _clipboard = { name: item.name, path: currentPath, isDir: item.isDir, mode: 'move' };
            updateClipboardUI();
            fpShowSuccessToast('\u2702 Cut: ' + item.name + ' — navigate to destination and click Paste here');
        };

        window.pasteClipboard = async function() {
            if (!_clipboard) return;
            const source = (_clipboard.path ? _clipboard.path + '/' : '') + _clipboard.name;
            const destination = currentPath;
            const endpoint = '/api/files/move';
            try {
                const res = await fetch(endpoint + '?project=' + enc(projectName), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'x-user-email': userEmail, 'x-user-role': userRole },
                    body: JSON.stringify({ source, destination })
                });
                const data = await res.json();
                if (!data.success) {
                    alert('Paste failed: ' + (data.message || 'Unknown error'));
                    return;
                }
                fpShowSuccessToast('\u2713 Pasted \u201c' + _clipboard.name + '\u201d successfully');
                _clipboard = null;
                updateClipboardUI();
                loadFiles();
            } catch (e) {
                alert('Paste failed: ' + e.message);
            }
        };

        window.clearClipboard = function() {
            _clipboard = null;
            updateClipboardUI();
        };

        // ─── Init ────────────────────────────────────────────────────
        applyViewButtons();
        if (currentView === 'grid') {
            document.getElementById('fileGrid').classList.remove('hidden');
            document.getElementById('fileListView').classList.add('hidden');
        } else {
            document.getElementById('fileGrid').classList.add('hidden');
            document.getElementById('fileListView').classList.remove('hidden');
        }
        renderBreadcrumb();
        loadFiles();

    })();
    </script>
